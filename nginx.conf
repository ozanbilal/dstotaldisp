server {
    listen 8080;
    server_name _;

    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    root /usr/share/nginx/html;
    index index.html;

    # .py dosyalarını text olarak servis et
    types {
        text/plain py;
    }

    # Railway proxy arkasında $scheme=http olur, X-Forwarded-Proto kullan
    set $redirect_scheme $scheme;
    if ($http_x_forwarded_proto) {
        set $redirect_scheme $http_x_forwarded_proto;
    }

    location = / {
        return 302 $redirect_scheme://$host/web-ui/;
    }

    location / {
        try_files $uri $uri/ =404;
    }

    location /web-ui/ {
        try_files $uri $uri/ /web-ui/index.html;
    }
}
